<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <title>Ridekaro - Premium</title>

  <style>
    body { margin:0; font-family:sans-serif; }
    #map { height:300px; width:100%; }
  </style>
</head>

<body>

<h2 style="text-align:center;">Book Your Ride</h2>

<div id="map"></div>

<div style="max-width:400px;margin:auto;padding:20px;">
  <input type="text" id="pickup" placeholder="Pickup"><br><br>
  <input type="text" id="drop" placeholder="Drop"><br><br>

  <button onclick="bookRide()">Confirm Booking</button>

  <p id="fare">Estimated Fare: ₹0</p>
</div>

<script>
let pickupLat = null;
let pickupLng = null;
let dropLat = null;
let dropLng = null;

// 📏 Distance
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// 💰 Fare
function calculateFare() {
  if (!pickupLat || !dropLat) return;

  let distance = getDistance(pickupLat, pickupLng, dropLat, dropLng);
  let fare = 30 + (distance * 10);

  document.getElementById("fare").innerText =
    "Estimated Fare: ₹" + Math.round(fare);
}

// 🚀 MAP
window.addEventListener("load", function () {

  var map = L.map('map');
  let dropMarker = null; // ✅ FIXED (only once)

  // Tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // 🌍 Location
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      pickupLat = pos.coords.latitude;
      pickupLng = pos.coords.longitude;

      map.setView([pickupLat, pickupLng], 15);

      L.marker([pickupLat, pickupLng]).addTo(map)
        .bindPopup("📍 Your Location")
        .openPopup();
    },
    () => {
      alert("Allow location");
      map.setView([28.6139, 77.2090], 10);
    }
  );

  // 📦 Drop click
  map.on('click', function (e) {

    dropLat = e.latlng.lat;
    dropLng = e.latlng.lng;

    if (dropMarker) map.removeLayer(dropMarker);

    dropMarker = L.marker([dropLat, dropLng]).addTo(map)
      .bindPopup("📍 Drop Location")
      .openPopup();

    calculateFare();
  });

});

// Dummy function
function bookRide() {
  alert("Ride booked!");
}
</script>

</body>
</html>
