<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridekaro 🚗</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e90ff, #00c6ff);
  color:white;
}

.header {
  text-align:center;
  padding:20px;
  background: rgba(0,0,0,0.4);
}

.logo {
  width:60px;
}

.card {
  background:white;
  color:black;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

#map {
  height: 350px !important;
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

input, button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
}

button {
  background:#ffcc00;
  font-weight:bold;
}

#fare {
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <!-- 🔁 PUT YOUR OWN LOGO FILE HERE -->
  <img class="logo" src="logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/743/743922.png'">
  <h1>Ridekaro 🚗</h1>
  <p>Fast • Easy • Affordable</p>
</div>

<div class="card">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<div class="card">
<h3>Book Ride</h3>

<div id="map"></div>

<input id="pickup" placeholder="Pickup">
<input id="drop" placeholder="Drop">

<button onclick="findRoute()">Calculate Route</button>
<button onclick="bookRide()">Book Ride</button>

<p id="fare">Estimated Fare: ₹0</p>
</div>

<div class="card">
<h3>My Rides</h3>
<div id="ridesList"></div>
</div>

<script type="module">

// 🔥 Firebase (your config)
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDq8djWCKZCx9a0evT8n85vYZt8srcxH8o",
  authDomain: "ridekaro-2237b.firebaseapp.com",
  projectId: "ridekaro-2237b",
  storageBucket: "ridekaro-2237b.firebasestorage.app",
  messagingSenderId: "805660027682",
  appId: "1:805660027682:web:0117b81f4ec8d341e5d37b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 AUTH
window.signup = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,email.value,password.value);
    alert("Signup success ✅");
  }catch(e){ alert(e.message); }
};

window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
    alert("Login success ✅");
    loadRides();
  }catch(e){ alert(e.message); }
};

// 🌍 MAP FIXED
let map;
let pickupLat, pickupLng, dropLat, dropLng;
let routeLayer;

window.onload = () => {

  map = L.map('map').setView([20.5937,78.9629],5);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
  }).addTo(map);

  // 📍 Current location
  navigator.geolocation.getCurrentPosition(
    pos=>{
      pickupLat = pos.coords.latitude;
      pickupLng = pos.coords.longitude;

      map.setView([pickupLat,pickupLng],14);

      L.marker([pickupLat,pickupLng]).addTo(map)
        .bindPopup("📍 You are here").openPopup();

      pickup.value = "Current Location";
    },
    ()=>{
      alert("Location permission denied");
    }
  );
};

// 🔍 GEOCODE
async function geocode(place){
  let res = await fetch(https://nominatim.openstreetmap.org/search?format=json&q=${place});
  let data = await res.json();

  if(!data.length){
    alert("Location not found");
    return null;
  }

  return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
}

// 🚗 ROUTE
async function getRoute(lat1,lng1,lat2,lng2){
  let url = https://router.project-osrm.org/route/v1/driving/${lng1},${lat1};${lng2},${lat2}?overview=full&geometries=geojson;
  let res = await fetch(url);
  let data = await res.json();

  if(!data.routes || !data.routes.length){
    alert("Route not found");
    return null;
  }

  return data.routes[0];
}

// 🚀 ROUTE + FARE
window.findRoute = async ()=>{

  document.getElementById("fare").innerText = "Calculating...";

  if(pickup.value !== "Current Location"){
    let p = await geocode(pickup.value);
    if(!p) return;
    [pickupLat,pickupLng] = p;
  }

  let d = await geocode(drop.value);
  if(!d) return;
  [dropLat,dropLng] = d;

  let route = await getRoute(pickupLat,pickupLng,dropLat,dropLng);
  if(!route) return;

  let coords = route.geometry.coordinates.map(c=>[c[1],c[0]]);

  if(routeLayer) map.removeLayer(routeLayer);

  routeLayer = L.polyline(coords,{color:'blue'}).addTo(map);
  map.fitBounds(routeLayer.getBounds());

  let distance = route.distance/1000;
  let fare = 40 + distance*12;

  document.getElementById("fare").innerText =
    Distance: ${distance.toFixed(2)} km | Fare: ₹${Math.round(fare)};
};

// 📦 BOOK RIDE
window.bookRide = async ()=>{
  if(!auth.currentUser){
    alert("Login first");
    return;
  }

  if(!dropLat){
    alert("Calculate route first");
    return;
  }

  try{
    await addDoc(collection(db,"rides"),{
      pickup: pickup.value,
      drop: drop.value,
      user: auth.currentUser.email,
      time: new Date()
    });

    alert("Ride booked 🚗");
    loadRides();

  }catch(e){
    alert(e.message);
  }
};

// 📄 LOAD RIDES
async function loadRides(){
  if(!auth.currentUser) return;

  let q = query(collection(db,"rides"),where("user","==",auth.currentUser.email));
  let snap = await getDocs(q);

  ridesList.innerHTML = "";

  snap.forEach(doc=>{
    let d = doc.data();
    ridesList.innerHTML += <p>🚗 ${d.pickup} → ${d.drop}</p>;
  });
}

</script>

</body>
</html>
