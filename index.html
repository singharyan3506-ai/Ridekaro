<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <title>Ridekaro - Premium</title>

  <style>
    body { margin:0; font-family:sans-serif; }
    #map { height:300px; width:100%; }
  </style>
</head>

<body>

<!-- ✅ WhatsApp Button (UNCHANGED) -->
<div style="text-align:center; margin-top:20px;">
  <a href="https://wa.me/917051768470" target="_blank">
    <button style="padding:15px; background:green; color:white; border:none; border-radius:10px;">
      Book on WhatsApp
    </button>
  </a>
</div>

<!-- ✅ LOGIN -->
<div style="padding:20px;">
  <h2>Login / Signup</h2>

  <input type="email" id="email" placeholder="Enter email"><br><br>
  <input type="password" id="password" placeholder="Enter password"><br><br>

  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- ✅ MAP -->
<div style="padding:20px;">
  <h2>Book Your Ride</h2>

  <div id="map"></div>

  <input id="pickup" placeholder="Pickup"><br>
  <input id="drop" placeholder="Drop"><br>

  <select id="rideType">
    <option>Bike Taxi</option>
    <option>Parcel Delivery</option>
    <option>Local Ride</option>
  </select><br><br>

  <button onclick="bookRide()">Confirm Booking</button>

  <p id="fare">Estimated Fare: ₹0</p>
</div>

<div id="ridesList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-firestore.js";

// ✅ YOUR FIREBASE CONFIG (UNCHANGED)
const firebaseConfig = {
  apiKey: "AIzaSyDq8djWCKZCx9a0evT8n85vYZt8srcxH8o",
  authDomain: "ridekaro-2237b.firebaseapp.com",
  projectId: "ridekaro-2237b",
  storageBucket: "ridekaro-2237b.firebasestorage.app",
  messagingSenderId: "805660027682",
  appId: "1:805660027682:web:0117b81f4ec8d341e5d37b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ✅ VARIABLES
let pickupLat=null, pickupLng=null, dropLat=null, dropLng=null;

// 📏 DISTANCE
function getDistance(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

// 💰 FARE
function calculateFare(){
  if(!pickupLat||!dropLat) return;
  let fare=30+(getDistance(pickupLat,pickupLng,dropLat,dropLng)*10);
  document.getElementById("fare").innerText="Estimated Fare: ₹"+Math.round(fare);
}

// 🚀 MAP
window.addEventListener("load",()=>{
  var map=L.map('map');
  let dropMarker=null;

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  navigator.geolocation.getCurrentPosition(pos=>{
    pickupLat=pos.coords.latitude;
    pickupLng=pos.coords.longitude;

    map.setView([pickupLat,pickupLng],15);

    L.marker([pickupLat,pickupLng]).addTo(map)
      .bindPopup("📍 Your Location").openPopup();
  });

  map.on('click',e=>{
    dropLat=e.latlng.lat;
    dropLng=e.latlng.lng;

    if(dropMarker) map.removeLayer(dropMarker);

    dropMarker=L.marker([dropLat,dropLng]).addTo(map)
      .bindPopup("📍 Drop Location").openPopup();

    calculateFare();
  });
});

// ✅ FIXED AUTH (IMPORTANT)
window.signup = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Signup successful ✅");
  } catch (err) {
    alert(err.message);
  }
};

window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Login successful ✅");
    loadRides();
  } catch (err) {
    alert(err.message);
  }
};

// ✅ FIXED BOOKING
window.bookRide = async function () {
  const pickup = document.getElementById("pickup").value;
  const drop = document.getElementById("drop").value;
  const rideType = document.getElementById("rideType").value;

  if (!auth.currentUser) {
    alert("Please login first");
    return;
  }

  try {
    await addDoc(collection(db, "rides"), {
      pickup: pickup,
      drop: drop,
      rideType: rideType,
      user: auth.currentUser.email,
      time: new Date()
    });

    alert("Ride booked successfully 🚗");
    loadRides();
  } catch (err) {
    alert(err.message);
  }
};

// LOAD RIDES
async function loadRides(){
  const user = auth.currentUser;
  if (!user) return;

  const q = query(collection(db, "rides"), where("user", "==", user.email));
  const snapshot = await getDocs(q);

  let html="";
  snapshot.forEach(doc=>{
    let d=doc.data();
    html+=`<div>🚗 ${d.pickup} → ${d.drop}</div>`;
  });

  document.getElementById("ridesList").innerHTML = html;
}
</script>

</body>
</html>
